# wbar — example config
#
# Copy this file to %APPDATA%\wbar\config.toml and tweak. Changes are
# picked up live — no restart required for theme, palette, font, widget
# format strings, or layout. Changes to bar.position / bar.height
# re-register the AppBar transparently.

[bar]
position = "top"      # "top" | "bottom"
height = 28

[font]
family = "Default"    # informational; the body font is egui's bundled monospace
size = 12.0

# Pick one of the five built-in themes:
#   Paper — warm cream, ink black, terracotta accent
#   Stone — cool gray, blue accent
#   Sage  — muted greens
#   Clay  — warm earth tones
#   Ink   — black background, off-white text (only dark theme)
theme = "Paper"

# Optional: override individual colours of the selected theme.
# Each field is a "#RRGGBB" or "#RRGGBBAA" hex string. Omit a field
# and the theme's value wins.
# [palette]
# accent = "#3F5C32"
# error  = "#B33525"

# Optional: override spacing / radius / font-size tokens.
# [tokens]
# radius_sm = 6.0

# Which widgets go in which region. Each id below references a
# [widgets.<id>] table.
[layout]
left   = ["workspaces"]
center = ["clock"]
# The right region renders right-to-left: first id is rightmost on screen.
right  = ["battery", "cpu", "memory"]

[widgets.workspaces]
type = "glazewm"
show_empty = false

[widgets.clock]
type = "clock"
# strftime format — see https://docs.rs/chrono/latest/chrono/format/strftime/
format = "%a %-d %b %-I:%M %p"
tick_seconds = 1

[widgets.memory]
type = "sysinfo"
metric = "ram"
icon = ""       # nf-fa-microchip; needs a Nerd Font installed
format = "{value:.0}%"
interval_seconds = 2

[widgets.cpu]
type = "sysinfo"
metric = "cpu"
icon = ""       # nf-oct-cpu
format = "{value:.0}%"
interval_seconds = 2
warn_above = 85.0     # text turns red above this %
# warn_color = "#FF0000"  # explicit override (defaults to palette.error)

[widgets.battery]
type = "sysinfo"
metric = "battery"
icon = ""       # nf-fa-battery_full
format = "{value:.0}%"
interval_seconds = 10
# Available template vars: {value} (charge %), {charging} (1.0 or 0.0)

# Optional sysinfo metric: network throughput.
# [widgets.net]
# type = "sysinfo"
# metric = "network"
# interface = "*"     # "*" or omit to sum all interfaces; or e.g. "Ethernet"
# format = "↓{rx_kbps:>5.0}k ↑{tx_kbps:>5.0}k"
# interval_seconds = 1

# A custom command widget runs an arbitrary shell command on an interval
# and shows the trimmed first line of stdout. Wrapped with cmd /C on
# Windows (handled internally) and sh -c elsewhere.
# [widgets.weather]
# type = "command"
# command = "curl -s wttr.in/?format=3"
# interval_seconds = 600
