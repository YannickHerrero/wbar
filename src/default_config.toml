# Default wbar config. Copied verbatim when no user config is found at
# %APPDATA%\wbar\config.toml. Keep this in sync with examples/config.toml.

[bar]
position = "top"
height = 28

[font]
family = "Default"
size = 12.0

theme = "Paper"

[layout]
left = ["workspaces"]
center = ["clock"]
# The right region renders right-to-left: the first id ends up rightmost.
# Reading the visual order left-to-right this is: memory, cpu, battery.
right = ["battery", "cpu", "memory"]

[widgets.workspaces]
type = "glazewm"
show_empty = false

[widgets.clock]
type = "clock"
# %a %-d %b %-I:%M %p  →  "Mon 3 Jan 2:30 PM" — matches zebar's "EEE d MMM t".
format = "%a %-d %b %-I:%M %p"
tick_seconds = 1

[widgets.memory]
type = "sysinfo"
metric = "ram"
# nf-fa-microchip (Nerd Font: Font Awesome)
icon = ""
format = "{value:.0}%"
interval_seconds = 2

[widgets.cpu]
type = "sysinfo"
metric = "cpu"
# nf-oct-cpu (Nerd Font: Octicons)
icon = ""
format = "{value:.0}%"
interval_seconds = 2
warn_above = 85.0

[widgets.battery]
type = "sysinfo"
metric = "battery"
# nf-fa-battery_full (Nerd Font: Font Awesome)
icon = ""
format = "{value:.0}%"
interval_seconds = 10
